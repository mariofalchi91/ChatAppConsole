name: .NET 10 Development CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/packages.lock.json

    - name: Restore Dependencies
      run: dotnet restore ChatAppConsole.slnx --source https://api.nuget.org/v3/index.json

    - name: Build Solution
      run: dotnet build ChatAppConsole.slnx --no-restore --configuration Debug /p:TreatWarningsAsErrors=true

    - name: Run Tests
      run: dotnet test ChatAppConsole.slnx --no-build --configuration Debug --logger "trx;LogFileName=test-results.trx"

    - name: Upload Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-trx
        path: "**/test-results.trx"
        if-no-files-found: warn

    - name: Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: .NET Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx